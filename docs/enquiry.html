<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enquiry | IKE-ELITE-COUTURE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="enquiry-hero">
    <h1>MAKE AN ENQUIRY</h1>
    <p>Tell us about the outfit you want and we'll get back to you.</p>
</section>

<section class="enquiry-container">

<form id="enquiryForm">

<div class="form-group">
<label>Full Name *</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email *</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>WhatsApp Number *</label>
<input type="tel" id="phone" required>
</div>

<!-- STYLE SELECT (FIXED) -->
<div class="form-group">
<label>Select Style *</label>
<select id="styleSelect" required>
<option value="">Loading styles...</option>
</select>
</div>

<div class="form-group">
<label>Event Date *</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>Additional Information</label>
<textarea id="message" rows="5"></textarea>
</div>

<button type="submit" class="btn">Submit Enquiry</button>

</form>

</section>

<script src="enquiry.js"></script>

</body>
</html>
