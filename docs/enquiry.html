<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enquiry | IKE-ELITE-COUTURE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="enquiry-hero">
<h1>MAKE AN ENQUIRY</h1>
<p>Tell us what you want, we will respond quickly.</p>
</section>

<section class="enquiry-container">

<form id="enquiryForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>WhatsApp Number</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Selected Style</label>
<input type="text" id="styleSelected" readonly>
<select id="styleCategory">

<option>Ankara</option>
<option>Luxury Gown</option>
<option>Corset Dress</option>
<option>Bridal Wear</option>
<option>Reception Dress</option>

</select>
</div>

<div class="form-group">
<label>Message</label>
<textarea id="message" rows="5"></textarea>
</div>

<button type="submit" class="btn">Send Enquiry</button>

</form>

</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // show selected style
    const styleName = localStorage.getItem("styleName");
    if (styleName) {
        document.getElementById("styleSelected").value = styleName;
    }

    document.getElementById("enquiryForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            style: localStorage.getItem("styleName"),
            message: document.getElementById("message").value
        };

        const res = await fetch("https://ike-elite-backend.onrender.com/api/enquiry", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
            showToast("Enquiry sent!");
        } else {
            showToast("Failed to send enquiry");
        }
    });

});
</script>
<script src="enquiry.js"></script>

</body>
</html>
