<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Waitlist | IKE-ELITE-COUTURE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="enquiry-hero">
<h1>JOIN OUR WAITLIST</h1>
<p>Be the first to know about new luxury drops & exclusive designs.</p>
</section>

<section class="enquiry-container">

<form id="waitlistForm">

<div class="form-group">
<label>Full Name *</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email *</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>WhatsApp Number *</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Style Interest</label>
<select id="interest">
<option>Ankara</option>
<option>Luxury Gown</option>
<option>Corset Dress</option>
<option>Bridal Wear</option>
<option>Children Couture</option>
</select>
</div>

<button type="submit" class="btn">
Join Waitlist
</button>

</form>

</section>

<script src="waitlist.js"></script>

</body>
</html>
